<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100" shape-rendering="crispEdges">
  <!-- Duck flying, wings DOWN (texture 2) -->
  <g>
    <!-- Body -->
    <ellipse cx="62" cy="62" rx="34" ry="22" fill="#8a5a2b" stroke="#3b2410" stroke-width="2"/>
    <!-- Belly -->
    <ellipse cx="60" cy="70" rx="24" ry="12" fill="#d9a86a"/>
    <!-- Head -->
    <circle cx="92" cy="44" r="18" fill="#1f6b3a" stroke="#0c3b1c" stroke-width="2"/>
    <!-- Neck band -->
    <rect x="78" y="56" width="18" height="4" fill="#ffffff" stroke="#0c3b1c" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="99" cy="40" r="3.2" fill="#ffffff"/>
    <circle cx="100" cy="40" r="1.8" fill="#111111"/>
    <!-- Beak -->
    <polygon points="110,44 124,40 124,48 110,52" fill="#f2a51a" stroke="#6a4a00" stroke-width="1.5"/>
    <line x1="112" y1="46" x2="122" y2="44" stroke="#6a4a00" stroke-width="1"/>
    <!-- Tail -->
    <polygon points="30,58 12,52 12,70 30,68" fill="#5a3a1a" stroke="#3b2410" stroke-width="1.5"/>
    <!-- Wing DOWN -->
    <path d="M 60 72 Q 52 96 40 98 Q 36 86 44 70 Q 50 64 60 66 Z" fill="#6b4220" stroke="#3b2410" stroke-width="2"/>
    <path d="M 56 82 Q 48 90 44 94" stroke="#3b2410" stroke-width="1.5" fill="none"/>
    <path d="M 60 78 Q 52 86 48 90" stroke="#3b2410" stroke-width="1.5" fill="none"/>
  </g>
</svg>
