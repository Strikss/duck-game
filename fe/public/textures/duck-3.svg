<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100" shape-rendering="crispEdges">
  <!-- Duck HIT/DEAD (texture 3) -->
  <g transform="rotate(15 60 50)">
    <!-- Body (limp) -->
    <ellipse cx="62" cy="62" rx="34" ry="20" fill="#6e4520" stroke="#3b2410" stroke-width="2"/>
    <!-- Belly -->
    <ellipse cx="60" cy="70" rx="24" ry="10" fill="#a88055"/>
    <!-- Head tilted -->
    <circle cx="92" cy="48" r="18" fill="#154a28" stroke="#0c3b1c" stroke-width="2"/>
    <!-- Neck band -->
    <rect x="78" y="60" width="18" height="4" fill="#dddddd" stroke="#0c3b1c" stroke-width="1"/>
    <!-- X eye left -->
    <line x1="95" y1="42" x2="103" y2="50" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="103" y1="42" x2="95" y2="50" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Beak drooping open -->
    <polygon points="110,50 124,54 124,62 110,58" fill="#c78410" stroke="#6a4a00" stroke-width="1.5"/>
    <!-- Tongue -->
    <path d="M 116 56 Q 118 64 114 68" stroke="#aa2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Tail limp -->
    <polygon points="30,64 10,74 14,82 30,74" fill="#4a2e12" stroke="#3b2410" stroke-width="1.5"/>
    <!-- Wings limp down -->
    <path d="M 60 72 Q 46 86 34 80 Q 38 70 52 68 Z" fill="#58361a" stroke="#3b2410" stroke-width="2"/>
    <path d="M 68 72 Q 82 86 94 82 Q 90 72 76 70 Z" fill="#58361a" stroke="#3b2410" stroke-width="2"/>
    <!-- Feather falling -->
    <ellipse cx="40" cy="20" rx="3" ry="8" fill="#a88055" opacity="0.8" transform="rotate(-25 40 20)"/>
    <ellipse cx="30" cy="30" rx="2" ry="6" fill="#6e4520" opacity="0.7" transform="rotate(15 30 30)"/>
  </g>
</svg>
